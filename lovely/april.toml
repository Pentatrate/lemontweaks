    self.tap = math.floor(math.random() * 101) == 100 -- oh i have ideas
else
    self.tap = false
end
'''
match_indent = true



# click between frames

[[patches]]
[patches.pattern]
target = "obj/notes/Block.lua"
pattern = '''if self.tap and savedata.options.audio.hitsounds then'''
position = "after"
payload = '''
if mods.lemontweaks.config.misc.fuckYouLMAOgottem and math.floor(math.random() * 21) == 20 then
    cs.cbfPopup = true
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/notes/ExtraTap.lua"
pattern = '''te.playOne(sounds.tap,"static",'sfx',math.min(1,cs.noteVolume)*0.5)'''
position = "after"
payload = '''
if mods.lemontweaks.config.misc.fuckYouLMAOgottem and math.floor(math.random() * 21) == 20 then
    cs.cbfPopup = true
end
'''
match_indent = true



# more romanNumerals

[[patches]]
[patches.pattern]
target = "obj/GameManager.lua"
pattern = '''rtf:drawRich(comboText,5,project.res.y - 15, fonts.digitalDisco, 1, 1, cs.vfx.uiColor)'''
